<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASES - Cantos das Aves</title>
    <!-- Bibliotecas de Realidade Aumentada Web -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #UI {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
            border-radius: 20px; font-family: sans-serif; pointer-events: none; text-align: center;
        }
    </style>
</head>
<body>

    <div id="UI">
        Aponte a câmera para uma carta do jogo ASES<br>
        <button id="btn-camera" style="margin-top: 8px; padding: 6px 12px; pointer-events: auto;">Ativar Câmera Manualmente</button>
    </div>

    <a-scene id="cenario-ar" mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        // ... (Mantenha o resto do código do loop que cria as 300 cartas exatamente igual) ...

        // Lógica para o botão de ativação manual se necessário
        const btnCamera = document.querySelector('#btn-camera');
        btnCamera.addEventListener('click', () => {
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); // Força o início do sistema de AR e o pedido da câmera
            btnCamera.style.display = 'none'; // Esconde o botão após clicar
        });
    </script>



    <div id="UI">Aponte para uma carta do jogo ASES</div>

    <!-- Configuração da Câmera e do Banco de Imagens das Cartas -->
    <!-- O arquivo 'targets.mind' conterá o padrão compilado das suas 300 cartas -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- EXEMPLO CARTA 1: Sabiá-laranjeira (Índice 0 no banco de dados) -->
        <a-entity mindar-image-target="targetIndex: 0" id="target-sabia">
            <!-- O som será carregado via streaming da internet quando a carta for detectada -->
            <a-entity id="audio-sabia" sound="src: url(https://s3.amazonaws.com/media.wikiaves.com.br/recordings/313/313092_a064732ca6ab88833003cb1c69bac77a.mp3); poolSize: 1"></a-entity>
        </a-entity>

        <!-- EXEMPLO CARTA 2: Bem-te-vi (Índice 1 no banco de dados) -->
        <a-entity mindar-image-target="targetIndex: 1" id="target-bemtevi">
            <a-entity id="audio-bemtevi" sound="src: url(https://seuservidor.com/cantos/bemtevi.mp3); poolSize: 1"></a-entity>
        </a-entity>

    </a-scene>

    <script>
        // Lógica para tocar o som ao detectar a carta e parar ao perder o foco
        
        // Configuração para o Sabiá
        const targetSabia = document.querySelector('#target-sabia');
        const audioSabia = document.querySelector('#audio-sabia');
        const uiText = document.querySelector('#UI');

        targetSabia.addEventListener("targetFound", event => {
            uiText.innerText = "Tocando: Sabiá-laranjeira";
            audioSabia.components.sound.playSound();
        });

        targetSabia.addEventListener("targetLoss", event => {
            uiText.innerText = "Aponte para uma carta do jogo ASES";
            audioSabia.components.sound.stopSound();
        });

        // Configuração para o Bem-te-vi
        const targetBemtevi = document.querySelector('#target-bemtevi');
        const audioBemtevi = document.querySelector('#audio-bemtevi');

        targetBemtevi.addEventListener("targetFound", event => {
            uiText.innerText = "Tocando: Bem-te-vi";
            audioBemtevi.components.sound.playSound();
        });

        targetBemtevi.addEventListener("targetLoss", event => {
            uiText.innerText = "Aponte para uma carta do jogo ASES";
            audioBemtevi.components.sound.stopSound();
        });
    </script>
</body>
</html>
